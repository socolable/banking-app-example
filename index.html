<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Your banking app pro</title>

    <meta
      name="description"
      content="Securely track your deposits and withdrawals with real-time exchange rates."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://banking-app-pro-example.netlify.app/"
    />
    <meta property="og:title" content="BankSafe - Your personal banking app" />
    <meta
      property="og:description"
      content="Manage your money with precision. Now with offline mode and real-time EUR/GBP rates."
    />
    <meta property="og:image" content="/preview-image.png" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="BankSafe" />
  </head>
  <body>
    <div id="app"></div>

    <div class="container">
      <div id="toast-container"></div>
      <button id="theme-toggle" class="secondary-btn">🌙 Dark Mode</button>

      <h1>My latest balance: <span id="balance-display">$0</span></h1>

      <div class="controls" id="controls">
        <input
          type="text"
          id="amount-input"
          inputmode="decimal"
          placeholder="Enter amount"
          aria-label="Transaction amount in dollars"
        />
        <div class="buttons-group" id="buttons-group">
          <button id="deposit-btn">Deposit</button>
          <button id="withdraw-btn">Withdraw</button>
          <button id="clear-all-btn">Clear all</button>
        </div>
      </div>
      <h3>Search and filter</h3>
      <input
        type="text"
        id="search-input"
        placeholder="Enter search keyword"
        aria-label="Search transaction history"
      />

      <h3>Deposits and Withdrawals</h3>
      <span id="total-deposit" aria-live="polite"></span>
      <span id="total-withdraw" aria-live="polite"></span>

      <h3>Transaction History</h3>
      <ul id="transaction-list"></ul>
    </div>

    <dialog id="confirmation-modal">
      <div class="modal-content">
        <h3 id="modal-title">Confirmation</h3>
        <p id="modal-text">Are you sure you want to clear all?</p>
        <button id="modal-cancel">Cancel</button>
        <button id="modal-confirm">Confirm</button>
      </div>
    </dialog>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
